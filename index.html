<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi Linmas</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#1e3c72">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */

.card{
background:white;
padding:25px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#1e3c72;
margin-bottom:20px;
}

label{
font-weight:bold;

}

select,button{
width:100%;

margin-top:10px;

border:1px solid #ccc;
}

button{
background:#1e3c72;

}

margin-top:10px;

video{

#preview{

@keyframes zoom{
from{transform:scale(0.3);opacity:0}

}

#gps{
font-size:13px;
margin-top:5px;
color:#555;
text-align:center;
}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">

<img src="/icon-512.png">
<h2>Absensi Linmas</h2>

</div>


<div class="card">

<h2>Absensi Linmas</h2>

<label>Nama Petugas</label>

<select id="nama">
<option value="">Memuat data...</option>
</select>


<label>Status</label>

<select id="status">
<option value="MASUK">Datang</option>
<option value="PULANG">Pulang</option>
<option value="IJIN">Ijin</option>
<option value="SAKIT">Sakit</option>
</select>

<div id="gps">Menunggu GPS...</div>

<video id="camera" autoplay playsinline></video>

<img id="preview">

<canvas id="canvas" style="display:none;"></canvas>

<button onclick="submitAbsen()">
Submit Absensi
</button>

<div id="message"></div>

</div>


<script>

const BASE_URL="https://absensi-backend-sc11.onrender.com"

/* POS JAGA */

const POS_LAT=-6.266123
const POS_LNG=106.652456
const MAX_RADIUS=100

let stream=null
let lokasi=null

/* CAMERA */

async function startCamera(){

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})

document.getElementById("camera").srcObject=stream

}catch{

document.getElementById("message").innerText="Kamera tidak tersedia"

}

}

/* FOTO + WATERMARK */

function capturePhoto(){

const video=document.getElementById("camera")
const canvas=document.getElementById("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

ctx.fillStyle="rgba(0,0,0,0.5)"
ctx.fillRect(0,canvas.height-80,canvas.width,80)

ctx.fillStyle="white"
ctx.font="16px Arial"

const nama=document.getElementById("nama").selectedOptions[0].text
const waktu=new Date().toLocaleString()

ctx.fillText(nama,10,canvas.height-50)
ctx.fillText(waktu,10,canvas.height-30)

if(lokasi){

ctx.fillText(
lokasi.latitude.toFixed(5)+", "+lokasi.longitude.toFixed(5),
10,canvas.height-10)

}

const foto=canvas.toDataURL("image/jpeg",0.7)

document.getElementById("preview").src=foto
document.getElementById("preview").style.display="block"

return foto

}

/* GPS */

function startGPS(){

navigator.geolocation.watchPosition(

pos=>{

lokasi=pos.coords

const jarak=haversine(
pos.coords.latitude,
pos.coords.longitude,
POS_LAT,
POS_LNG
)

document.getElementById("gps").innerText=
"Jarak dari pos: "+Math.round(jarak)+" meter"

},

err=>{

document.getElementById("gps").innerText="GPS tidak tersedia"

},

{enableHighAccuracy:true}

)

}

/* HITUNG JARAK */

function haversine(lat1,lon1,lat2,lon2){

const R=6371e3
const φ1=lat1*Math.PI/180
const φ2=lat2*Math.PI/180

const Δφ=(lat2-lat1)*Math.PI/180
const Δλ=(lon2-lon1)*Math.PI/180

const a=Math.sin(Δφ/2)**2+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)**2

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

/* LOAD PETUGAS */

async function loadPetugas(){

try{

const res=await fetch(BASE_URL+"/petugas")
const data=await res.json()

const select=document.getElementById("nama")

select.innerHTML='<option value="">-- Pilih Nama --</option>'

data.forEach(p=>{

const option=document.createElement("option")

option.value=p.id
option.textContent=p.nama

select.appendChild(option)

})

}catch{

document.getElementById("message").innerText="Gagal memuat petugas"

}

}

/* OFFLINE STORAGE */

function simpanOffline(data){

let list=JSON.parse(localStorage.getItem("absenOffline")||"[]")

list.push(data)

localStorage.setItem("absenOffline",JSON.stringify(list))

}

/* SYNC OFFLINE */

async function syncOffline(){

let list=JSON.parse(localStorage.getItem("absenOffline")||"[]")

if(list.length===0)return

for(let data of list){

try{

await fetch(BASE_URL+"/absensi",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

}catch{
return
}

}

localStorage.removeItem("absenOffline")

}

/* SUBMIT */

async function submitAbsen(){

const petugas_id=document.getElementById("nama").value
const status=document.getElementById("status").value

if(!petugas_id){

document.getElementById("message").innerText="Pilih nama"
return

}

if(!lokasi){

document.getElementById("message").innerText="GPS belum siap"
return

}

/* GEOFENCE */

const jarak=haversine(
lokasi.latitude,
lokasi.longitude,
POS_LAT,
POS_LNG
)

if(jarak>MAX_RADIUS){

document.getElementById("message").innerText="Terlalu jauh dari pos jaga"
return

}

const foto=capturePhoto()

const data={

petugas_id,
status,
latitude:lokasi.latitude,
longitude:lokasi.longitude,
foto

}

try{

const res=await fetch(BASE_URL+"/absensi",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

})

if(res.ok){

document.getElementById("message").innerText="Absensi berhasil"

}else{

document.getElementById("message").innerText="Server menolak absensi"

}

}catch{

simpanOffline(data)

document.getElementById("message").innerText="Offline. Data disimpan"

}

}

/* INIT */

loadPetugas()
startCamera()
startGPS()

window.addEventListener("online",syncOffline)

/* SPLASH */

window.onload=()=>{

setTimeout(()=>{

document.getElementById("splash").style.display="none"

},1200)

}

/* SERVICE WORKER */

if('serviceWorker' in navigator){

navigator.serviceWorker.register('/service-worker.js')

}

</script>

</body>
</html>
