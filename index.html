<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi Linmas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
padding:25px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#1e3c72;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
}

button{
background:#1e3c72;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#888;
}

#statusArea{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

video{
width:100%;
margin-top:10px;
border-radius:8px;
display:none;
}

#preview{
width:100%;
margin-top:10px;
border-radius:8px;
display:none;
}

#gps{
margin-top:8px;
font-size:13px;
text-align:center;
}

#message{
margin-top:10px;
text-align:center;
font-weight:bold;
}

.loading{
color:#e67e22;
}

.success{
color:#27ae60;
}

.error{
color:#e74c3c;
}

</style>

</head>

<body>

<div class="card">

<h2>Absensi Linmas</h2>

<select id="nama" onchange="pilihPetugas()">
<option value="">Memuat petugas...</option>
</select>

<div id="jadwalArea"></div>

<div id="statusArea" style="display:none"></div>

<div id="gps"></div>

<video id="camera" autoplay playsinline></video>

<button id="btnFoto" onclick="ambilFoto()" style="display:none">
Ambil Foto
</button>

<img id="preview">

<button id="btnKirim" onclick="submitAbsensi()" style="display:none">
Kirim Absensi
</button>

<div id="message"></div>

</div>

<script>

const BASE_URL="https://absensi-backend-sc11.onrender.com"

const POS_LAT=-6.266123
const POS_LNG=106.652456
const MAX_RADIUS=100

const SHIFT_LABEL=[
"SHIFT PAGI 1",
"SHIFT PAGI 2",
"SHIFT MALAM 1",
"SHIFT MALAM 2",
"LIBUR"
]

let petugasList=[]
let petugasAktif=null
let statusDipilih=null
let lokasi=null
let fotoBase64=null
let stream=null

/* ================= LOAD PETUGAS ================= */

async function loadPetugas(){

try{

const res=await fetch(BASE_URL+"/petugas")
petugasList=await res.json()

const select=document.getElementById("nama")

select.innerHTML='<option value="">-- Pilih Nama --</option>'

petugasList.forEach(p=>{

const opt=document.createElement("option")
opt.value=p.id
opt.textContent=p.nama
select.appendChild(opt)

})

}catch{

setMessage("Gagal memuat petugas","error")

}

}

/* ================= SIKLUS ================= */

function getSiklusIndexByDate(dateObj){

const startDate=new Date("2026-01-26T00:00:00+07:00")

const d=new Date(dateObj)
d.setHours(0,0,0,0)

const diffDays=Math.floor((d-startDate)/(1000*60*60*24))

return ((diffDays%5)+5)%5

}

/* ================= PILIH PETUGAS ================= */

function pilihPetugas(){

const id=parseInt(document.getElementById("nama").value)

petugasAktif=petugasList.find(p=>p.id===id)

if(!petugasAktif) return

const today=new Date()

const globalIndex=getSiklusIndexByDate(today)

const petugasIndex=
(globalIndex+(petugasAktif.siklus_offset??0))%5

document.getElementById("jadwalArea").innerHTML=
"<b>Jadwal Hari Ini</b><br>"+SHIFT_LABEL[petugasIndex]

renderStatusButtons(petugasIndex)

}

/* ================= STATUS BUTTON ================= */

function renderStatusButtons(index){

const area=document.getElementById("statusArea")

area.innerHTML=""

if(index===4){

area.innerHTML+=`<button onclick="pilihStatus('MASUK')">MASUK</button>`
area.innerHTML+=`<button onclick="pilihStatus('PULANG')">PULANG</button>`

}else{

area.innerHTML+=`<button onclick="pilihStatus('MASUK')">MASUK</button>`
area.innerHTML+=`<button onclick="pilihStatus('PULANG')">PULANG</button>`
area.innerHTML+=`<button onclick="pilihStatus('IZIN')">IZIN</button>`
area.innerHTML+=`<button onclick="pilihStatus('SAKIT')">SAKIT</button>`

}

area.style.display="grid"

}

/* ================= PILIH STATUS ================= */

function pilihStatus(status){

statusDipilih=status

if(status==="MASUK"||status==="PULANG"){

startGPS()

}else{

startCamera()

}

}

/* ================= GPS ================= */

function startGPS(){

setMessage("Mengambil lokasi...","loading")

navigator.geolocation.getCurrentPosition(

pos=>{

lokasi=pos.coords

const jarak=haversine(
lokasi.latitude,
lokasi.longitude,
POS_LAT,
POS_LNG
)

document.getElementById("gps").innerText=
"Jarak dari pos "+Math.round(jarak)+" meter"

if(jarak>MAX_RADIUS){

setMessage("Anda harus berada di pos jaga","error")
return
}

startCamera()

},

()=>{

setMessage("GPS gagal","error")

},

{enableHighAccuracy:true,timeout:10000}

)

}

/* ================= CAMERA ================= */

async function startCamera(){

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})

const video=document.getElementById("camera")

video.srcObject=stream
video.style.display="block"

document.getElementById("btnFoto").style.display="block"

}catch{

setMessage("Kamera tidak tersedia","error")

}

}

/* ================= FOTO ================= */

function ambilFoto(){

const video=document.getElementById("camera")

const canvas=document.createElement("canvas")

canvas.width=640
canvas.height=480

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0,640,480)

const nama=document.getElementById("nama").selectedOptions[0].text
const waktu=new Date().toLocaleString()

ctx.fillStyle="rgba(0,0,0,0.5)"
ctx.fillRect(0,420,640,60)

ctx.fillStyle="white"
ctx.font="14px Arial"

ctx.fillText(nama,10,440)
ctx.fillText(waktu,10,460)

fotoBase64=canvas.toDataURL("image/jpeg",0.6)

document.getElementById("preview").src=fotoBase64
document.getElementById("preview").style.display="block"

document.getElementById("btnKirim").style.display="block"

stopCamera()

}

/* ================= STOP CAMERA ================= */

function stopCamera(){

if(stream){

stream.getTracks().forEach(track=>track.stop())

}

}

/* ================= SUBMIT ================= */

async function submitAbsensi(){

document.getElementById("btnKirim").disabled=true

setMessage("Mengirim absensi...","loading")

const data={
petugas_id:petugasAktif.id,
status:statusDipilih,
latitude:lokasi?lokasi.latitude:null,
longitude:lokasi?lokasi.longitude:null,
foto:fotoBase64
}

try{

const res=await fetch(BASE_URL+"/absensi",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

const result=await res.json()

if(res.ok){

setMessage("Absensi berhasil","success")

resetUI()

}else{

setMessage(result.error,"error")

}

}catch{

simpanOffline(data)

setMessage("Offline. Data disimpan","error")

}

document.getElementById("btnKirim").disabled=false

}

/* ================= OFFLINE ================= */

function simpanOffline(data){

let list=JSON.parse(localStorage.getItem("absenOffline")||"[]")

list.push(data)

localStorage.setItem("absenOffline",JSON.stringify(list))

}

async function syncOffline(){

let list=JSON.parse(localStorage.getItem("absenOffline")||"[]")

if(list.length===0) return

for(let data of list){

try{

await fetch(BASE_URL+"/absensi",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

}catch{

return

}

}

localStorage.removeItem("absenOffline")

}

/* ================= UTIL ================= */

function setMessage(text,type){

const el=document.getElementById("message")

el.className=type
el.innerText=text

}

function resetUI(){

fotoBase64=null
lokasi=null

document.getElementById("preview").style.display="none"
document.getElementById("camera").style.display="none"
document.getElementById("btnFoto").style.display="none"
document.getElementById("btnKirim").style.display="none"

}

/* ================= HAVERSINE ================= */

function haversine(lat1,lon1,lat2,lon2){

const R=6371e3

const φ1=lat1*Math.PI/180
const φ2=lat2*Math.PI/180

const Δφ=(lat2-lat1)*Math.PI/180
const Δλ=(lon2-lon1)*Math.PI/180

const a=Math.sin(Δφ/2)**2+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)**2

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

/* ================= INIT ================= */

loadPetugas()

window.addEventListener("online",syncOffline)

</script>

</body>
</html>
